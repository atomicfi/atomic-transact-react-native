name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v7
      - name: node
        uses: actions/setup-node@v7
        with:
          node-version-file: '.nvmrc'
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: yarn
      - name: Update package.json version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
          else
            TAG_NAME=$(git describe --tags --abbrev=0)
          fi
          VERSION=${TAG_NAME#v}
          npm version $VERSION --no-git-tag-version
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Updated package.json version to $VERSION"

      - name: Publish
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # Prereleases (anything with a `-` per semver — e.g. *-dynamic,
          # *-beta.1) publish under a dist-tag derived from the prerelease
          # label so they don't displace `latest`. npm rejects prerelease
          # publishes without --tag, so this also prevents the failure mode
          # where a wrapper tag predates the dist-tag mapping.
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_LABEL="${VERSION#*-}"
            # Use just the first dot-segment as the dist-tag (e.g. beta.1 → beta)
            DIST_TAG="${PRERELEASE_LABEL%%.*}"
            echo "Publishing prerelease $VERSION under dist-tag '$DIST_TAG'"
            npm publish --access public --tag "$DIST_TAG"
          else
            npm publish --access public
          fi

  sync_linear_release:
    if: github.event_name == 'release'
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - id: release
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - uses: linear/linear-release-action@c0cb8354a362c24c6d3e0948f37fd66d07588e3f
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY_REACT_NATIVE }}
          command: sync
          name: React Native ${{ steps.release.outputs.version }}
          version: ${{ steps.release.outputs.version }}
          links: |
            Source release=${{ github.event.release.html_url }}

      - uses: linear/linear-release-action@c0cb8354a362c24c6d3e0948f37fd66d07588e3f
        with:
          access_key: ${{ secrets.LINEAR_ACCESS_KEY_REACT_NATIVE }}
          command: complete
          version: ${{ steps.release.outputs.version }}
