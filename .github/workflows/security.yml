name: Security

on:
  pull_request:
    branches:
      - master

jobs:
  vuln-dep-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Install node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: yarn
      - name: yarn install
        run: yarn install --frozen-lockfile
      - name: yarn audit
        run: yarn dlx audit-ci@^6 --config ./audit-ci.jsonc
